services:
  # 1. Express Backend Web Service
  - type: web
    name: investiq-backend
    env: node
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://investiq-frontend.onrender.com # Modify with your final frontend domain URL
      - key: GEMINI_API_KEY
        sync: false # Set in the Render dashboard
      - key: TAVILY_API_KEY
        sync: false # Set in the Render dashboard
      - key: ALPHA_VANTAGE_API_KEY
        sync: false # Set in the Render dashboard
      - key: NEWS_API_KEY
        sync: false # Set in the Render dashboard
      - key: GNEWS_API_KEY
        sync: false # Set in the Render dashboard

  # 2. Vite React Static Site Frontend
  - type: web
    name: investiq-frontend
    env: static
    plan: free
    rootDir: Frontend/client
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000
    envVars:
      - key: VITE_API_URL
        value: https://investiq-backend.onrender.com # Points to your backend Render URL
